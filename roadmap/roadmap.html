<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIAGARI · Roadmap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="roadmap.css">
</head>
<body>

  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="../landing/landing.html">📁 Projects</a>
      <a href="../idea/idea.html">💡 Idea Factory</a>
      <a href="../progress/progress.html">📊 Progress</a>
      <a href="../roadmap/roadmap.html" class="active">🗺️ Roadmap</a>
      <a href="../postboard/postboard.html">📰 Post Board</a>
      <a href="../message/message.html">💬 Chats</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1><i class="fas fa-map"></i> Roadmap</h1>
      <div class="stats-badge">
        <i class="fas fa-calendar-alt"></i>
        <span id="timelineSpan">0 epics</span>
      </div>
    </div>

    <!-- Timeline Header -->
    <div class="timeline-wrapper">
      <div class="timeline-header">
        <div class="timeline-label-col"></div>
        <div class="timeline-quarters">
          <div class="quarter">Q1</div>
          <div class="quarter">Q2</div>
          <div class="quarter">Q3</div>
          <div class="quarter">Q4</div>
        </div>
      </div>

      <!-- Timeline Rows -->
      <div id="timelineContainer" class="timeline-container">
        <!-- Epics will appear here -->
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="addEpicBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Epic</button>
      <button id="viewAllBtn" class="btn-secondary"><i class="fas fa-list"></i> View All</button>
    </div>
  </main>

  <!-- Add/Edit Epic Modal -->
  <div id="epicModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Add Epic</h3>
        <button id="closeModalBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="epicName" placeholder="Epic name">
        <select id="epicColor">
          <option value="pink">🌸 Pink (UI/UX)</option>
          <option value="blue">💙 Blue (Frontend)</option>
          <option value="red">❤️ Red (Backend)</option>
          <option value="green">💚 Green (DevOps)</option>
          <option value="purple">💜 Purple (Database)</option>
          <option value="orange">🧡 Orange (Testing)</option>
        </select>
        <div class="duration-slider">
          <label>Duration (quarters)</label>
          <input type="range" id="durationSlider" min="1" max="4" value="2" step="1">
          <span id="durationValue">2 quarters</span>
        </div>
        <select id="startQuarter">
          <option value="0">Start: Q1</option>
          <option value="1" selected>Start: Q2</option>
          <option value="2">Start: Q3</option>
          <option value="3">Start: Q4</option>
        </select>
        <textarea id="epicDesc" rows="3" placeholder="Description (optional)"></textarea>
      </div>
      <div class="modal-footer">
        <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
        <button id="saveEpicBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- View All Epics Modal -->
  <div id="viewModal" class="modal">
    <div class="modal-content view-modal">
      <div class="modal-header">
        <h3>All Epics</h3>
        <button id="closeViewModalBtn" class="close-btn">&times;</button>
      </div>
      <div id="viewModalBody" class="modal-body">
        <!-- Epics list will appear here -->
      </div>
      <div class="modal-footer">
        <button id="closeViewFooterBtn" class="btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <div id="toastMsg" class="toast">Epic saved!</div>

  <script src="roadmap.js"></script>
</body>
</html>
