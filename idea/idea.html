<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIAGARI · Idea Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="idea.css">
</head>
<body>

  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="../landing/landing.html">📁 Projects</a>
      <a href="../idea/idea.html" class="active">💡 Idea Factory</a>
      <a href="../progress/progress.html">📊 Progress</a>
      <a href="../roadmap/roadmap.html">🗺️ Roadmap</a>
      <a href="../postboard/postboard.html">📰 Post Board</a>
      <a href="../message/message.html">💬 Chats</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2><i class="fas fa-lightbulb"></i> Idea Factory</h2>
      <div class="stats-badge">
        <i class="fas fa-brain"></i>
        <span id="ideaCount">0</span> ideas
      </div>
    </div>

    <div id="ideasContainer" class="ideas-grid">
      <!-- Ideas will appear here -->
    </div>

    <button id="addIdeaBtn" class="floating-btn">+</button>
  </main>

  <!-- Add/Edit Idea Modal -->
  <div id="ideaModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">New Idea</h3>
        <button id="closeModalBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="ideaTitle" placeholder="Idea title">
        <textarea id="ideaDesc" rows="3" placeholder="Description"></textarea>
        <select id="ideaCategory">
          <option value="sketch">🎨 Sketch</option>
          <option value="flowchart">📊 Flowchart</option>
          <option value="color">🎨 Color Palette</option>
          <option value="design">✨ Design</option>
          <option value="tech">💻 Tech</option>
          <option value="business">📈 Business</option>
        </select>
        <input type="text" id="ideaAuthor" placeholder="Your name" value="Creative User">
      </div>
      <div class="modal-footer">
        <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
        <button id="saveIdeaBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Idea Detail Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="detailTitle">Idea Details</h3>
        <button id="closeDetailBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button id="closeDetailModalBtn" class="btn-secondary">Close</button>
        <button id="editFromDetailBtn" class="btn-primary">Edit</button>
      </div>
    </div>
  </div>

  <div id="toastMsg" class="toast">Idea saved!</div>

  <script src="idea.js"></script>
</body>
</html>
