<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SHIAGARI - Idea Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="idea.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="landing.html"><i class="fas fa-home"></i> Home</a>
      <a href="landing.html"><i class="fas fa-project-diagram"></i> Projects</a>
      <a href="#" class="active"><i class="fas fa-lightbulb"></i> Idea Factory</a>
      <a href="#"><i class="fas fa-chart-line"></i> Progress Tracker</a>
      <a href="#"><i class="fas fa-clipboard-list"></i> Post Board</a>
      <a href="#"><i class="fas fa-comments"></i> Chats</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <h2><i class="fas fa-lightbulb"></i> Idea Factory</h2>
      <div class="stats-badge">
        <i class="fas fa-brain"></i>
        <span id="ideaCount">0</span> ideas brewing
      </div>
    </header>

    <section class="idea-grid" id="ideaGrid">
      <!-- Dynamic idea cards will be injected here -->
    </section>

    <!-- Floating Add Button -->
    <div class="floating-add" id="floatingAddBtn">
      <i class="fas fa-plus"></i>
    </div>
  </main>

  <!-- Add/Edit Idea Modal -->
  <div class="modal" id="ideaModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle"><i class="fas fa-lightbulb"></i> New Idea</h3>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label><i class="fas fa-heading"></i> Idea Title</label>
          <input type="text" id="ideaTitle" placeholder="e.g., AI-powered design tool" maxlength="60">
        </div>
        <div class="form-group">
          <label><i class="fas fa-align-left"></i> Description</label>
          <textarea id="ideaDesc" rows="3" placeholder="What's the idea about?"></textarea>
        </div>
        <div class="form-group">
          <label><i class="fas fa-tag"></i> Category</label>
          <select id="ideaCategory">
            <option value="sketch">🎨 Sketch</option>
            <option value="flowchart">📊 Flowchart</option>
            <option value="color">🎨 Color Palette</option>
            <option value="design">✨ Design</option>
            <option value="tech">💻 Tech</option>
            <option value="business">📈 Business</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-user"></i> Author</label>
          <input type="text" id="ideaAuthor" placeholder="Your name" value="Creative User">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button class="btn-primary" id="saveIdeaBtn">Save Idea</button>
      </div>
    </div>
  </div>

  <!-- Idea Detail Modal (View Mode) -->
  <div class="modal" id="detailModal">
    <div class="modal-content detail-modal">
      <div class="modal-header">
        <h3 id="detailTitle"><i class="fas fa-lightbulb"></i> Idea Details</h3>
        <button class="modal-close" id="closeDetailBtn">&times;</button>
      </div>
      <div class="modal-body" id="detailBody">
        <!-- Dynamic content -->
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="closeDetailModalBtn">Close</button>
        <button class="btn-primary" id="editFromDetailBtn">Edit Idea</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toastMsg">
    <i class="fas fa-check-circle"></i>
    <span id="toastText">Idea saved!</span>
  </div>

  <script src="idea.js"></script>
</body>
</html>
