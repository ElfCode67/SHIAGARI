<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIAGARI · Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="landing.css">
</head>
<body>

  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="../landing/landing.html" class="active">📁 Projects</a>
      <a href="../idea/idea.html">💡 Idea Factory</a>
      <a href="../progress/progress.html">📊 Progress</a>
      <a href="../roadmap/roadmap.html">🗺️ Roadmap</a>
      <a href="../postboard/postboard.html">📰 Post Board</a>
      <a href="../message/message.html">💬 Chats</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2>Projects</h2>
      <div class="stats-badge">
        <i class="fas fa-rocket"></i>
        <span id="projectCount">0</span> projects
      </div>
    </div>

    <div id="projectsContainer" class="projects">
      <!-- Projects will appear here -->
    </div>
  </main>

  <!-- Add Project Modal -->
  <div id="projectModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>New Project</h3>
        <button id="closeModalBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="projectName" placeholder="Project name">
        <textarea id="projectDesc" placeholder="Description"></textarea>
        <select id="projectStatus">
          <option value="active">Active</option>
          <option value="planning">Planning</option>
          <option value="hold">On Hold</option>
        </select>
      </div>
      <div class="modal-footer">
        <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
        <button id="saveProjectBtn" class="btn-primary">Create</button>
      </div>
    </div>
  </div>

  <div id="toastMsg" class="toast">Project saved!</div>

  <script src="landing.js"></script>
</body>
</html>
