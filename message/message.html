<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIAGARI · Chats</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="message.css">
</head>
<body>

  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="../landing/landing.html">📁 Projects</a>
      <a href="../idea/idea.html">💡 Idea Factory</a>
      <a href="../progress/progress.html">📊 Progress</a>
      <a href="../roadmap/roadmap.html">🗺️ Roadmap</a>
      <a href="../postboard/postboard.html">📰 Post Board</a>
      <a href="../message/message.html" class="active">💬 Chats</a>
    </nav>
  </aside>

  <!-- Chat List -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <i class="fas fa-comments"></i> Conversations
    </div>
    <div id="chatList" class="chat-list">
      <!-- Users will appear here -->
    </div>
  </div>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-header" id="dragHandle">
      <div class="chat-user-info">
        <div class="chat-avatar" id="currentAvatar">👤</div>
        <span id="currentUserName">Select a chat</span>
      </div>
      <button id="minimizeBtn" class="minimize-btn">−</button>
    </div>

    <div id="chatMessages" class="chat-messages">
      <div class="empty-chat">Select a conversation to start messaging</div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="messageInput" placeholder="Type a message..." disabled>
      <button id="sendBtn" disabled>📤</button>
    </div>
  </div>

  <div id="toastMsg" class="toast">Message sent!</div>

  <script src="message.js"></script>
</body>
</html>
