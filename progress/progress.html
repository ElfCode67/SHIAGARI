<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SHIAGARI - Progress Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="progress.css">
</head>
<body>

<aside class="sidebar">
  <h1>SHIAGARI</h1>
  <nav>
    <a href="../landing/landing.html"><i class="fas fa-project-diagram"></i> <span>Projects</span></a>
    <a href="../idea/idea.html"><i class="fas fa-lightbulb"></i> <span>Idea Factory</span></a>
    <a href="../progress/progress.html" class="active"><i class="fas fa-chart-line"></i> <span>Progress Tracker</span></a>
    <a href="#" id="navRoadmap"><i class="fas fa-clipboard-list"></i> <span>Roadmap</span></a>
  </nav>
</aside>

<main class="main">
  <header class="topbar">
    <div class="header-left">
      <h2><i class="fas fa-chart-simple"></i> Progress Tracker</h2>
      <div class="project-selector">
        <select id="projectSelect">
          <option value="project1">Project 1 - Dashboard Redesign</option>
          <option value="project2">Project 2 - Mobile App Launch</option>
          <option value="project3">Project 3 - API Integration</option>
        </select>
      </div>
    </div>
    <div class="stats-badge">
      <i class="fas fa-rocket"></i>
      <span id="overallProgress">0</span>% complete
    </div>
  </header>

  <div class="tracker" id="trackerContainer">
    <!-- Dynamic columns will be injected here -->
  </div>

  <!-- Add Task Modal -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-plus-circle"></i> Add New Task</h3>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label><i class="fas fa-tag"></i> Task Name</label>
          <input type="text" id="taskName" placeholder="e.g., Design system, API setup" maxlength="50">
        </div>
        <div class="form-group">
          <label><i class="fas fa-layer-group"></i> Category</label>
          <select id="taskCategory">
            <option value="uiux">🎨 UI/UX</option>
            <option value="frontend">💻 Frontend</option>
            <option value="backend">⚙️ Backend</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-columns"></i> Column</label>
          <select id="taskColumn">
            <option value="notstarted">📋 Not Started</option>
            <option value="inprogress">🔄 In Progress</option>
            <option value="finished">✅ Finished</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
        <button class="btn-primary" id="saveTaskBtn">Add Task</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toastMsg">
    <i class="fas fa-check-circle"></i>
    <span id="toastText">Task updated!</span>
  </div>

</main>

<script src="progress.js"></script>
</body>
</html>
