<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIAGARI · Progress Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="progress.css">
</head>
<body>

  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="../landing/landing.html">📁 Projects</a>
      <a href="../idea/idea.html">💡 Idea Factory</a>
      <a href="../progress/progress.html" class="active">📊 Progress</a>
      <a href="../roadmap/roadmap.html">🗺️ Roadmap</a>
      <a href="../postboard/postboard.html">📰 Post Board</a>
      <a href="../message/message.html">💬 Chats</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h2><i class="fas fa-chart-simple"></i> Progress Tracker</h2>
        <div class="project-selector">
          <select id="projectSelect">
            <option value="project1">Project 1 - Dashboard Redesign</option>
            <option value="project2">Project 2 - Mobile App Launch</option>
            <option value="project3">Project 3 - API Integration</option>
          </select>
        </div>
      </div>
      <div class="stats-badge">
        <i class="fas fa-rocket"></i>
        <span id="overallProgress">0</span>% complete
      </div>
    </div>

    <div id="kanbanContainer" class="kanban-board">
      <!-- Columns will appear here -->
    </div>
  </main>

  <!-- Add Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add New Task</h3>
        <button id="closeModalBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="taskName" placeholder="Task name">
        <select id="taskCategory">
          <option value="uiux">🎨 UI/UX</option>
          <option value="frontend">💻 Frontend</option>
          <option value="backend">⚙️ Backend</option>
        </select>
      </div>
      <div class="modal-footer">
        <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
        <button id="saveTaskBtn" class="btn-primary">Add Task</button>
      </div>
    </div>
  </div>

  <div id="toastMsg" class="toast">Task updated!</div>

  <script src="progress.js"></script>
</body>
</html>
