<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Progress Tracker</title>
  <link rel="stylesheet" href="progress.css">
</head>
<body>

<aside class="sidebar">
  <h1>SHIAGARI</h1>
  <nav>
    <a href="landing.html">Projects</a>
    <a href="idea.html">Idea Factory</a>
    <a href="#" class="active">Progress Tracker</a>
    <a href="#">Post Board</a>
    <a href="#">Chats</a>
  </nav>
</aside>

<main class="main">
  <header>
    <h2>Project 1</h2>
  </header>

  <div class="tracker">

    <!-- Columns -->
    <div class="column">
      <h3>NOT STARTED</h3>

      <div class="task">
        <p>Task 1</p>
        <div class="bar"></div>
      </div>

      <div class="task">
        <p>Task 1</p>
        <div class="bar"></div>
      </div>

    </div>

    <div class="column">
      <h3>IN PROGRESS</h3>

      <div class="task">
        <p>Task 1</p>
        <div class="bar progress"></div>
      </div>

      <div class="task">
        <p>Task 1</p>
        <div class="bar progress long"></div>
      </div>

    </div>

    <div class="column">
      <h3>FINISHED</h3>

      <div class="task done">
        <p>Task 1</p>
        <div class="bar full"></div>
      </div>

      <div class="task done">
        <p>Task 1</p>
        <div class="bar full"></div>
      </div>

    </div>

    <!-- Chart -->
    <div class="chart">
      <div class="circle"></div>

      <div class="legend">
        <p><span class="pink"></span> UI/UX</p>
        <p><span class="red"></span> Backend</p>
        <p><span class="blue"></span> Frontend</p>
      </div>
    </div>

  </div>

</main>

</body>
</html>
