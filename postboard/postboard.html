<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SHIAGARI · Post Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="postboard.css">
</head>
<body>

  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="../landing/landing.html"><i class="fas fa-project-diagram"></i> <span>Projects</span></a>
      <a href="../idea/idea.html"><i class="fas fa-lightbulb"></i> <span>Idea Factory</span></a>
      <a href="../progress/progress.html"><i class="fas fa-chart-line"></i> <span>Progress Tracker</span></a>
      <a href="../roadmap/roadmap.html"><i class="fas fa-map"></i> <span>Roadmap</span></a>
      <a href="../postboard/postboard.html" class="active"><i class="fas fa-newspaper"></i> <span>Post Board</span></a>
      <a href="../message/message.html"><i class="fas fa-comments"></i> <span>Chats</span></a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <h2><i class="fas fa-newspaper"></i> Post Board</h2>
      <div class="stats-badge">
        <i class="fas fa-pen-fancy"></i>
        <span id="postCount">0</span> posts
      </div>
    </header>

    <div class="post-box">
      <img src="https://ui-avatars.com/api/?background=3b82f6&color=fff&name=ME" alt="You">
      <input type="text" id="postInput" placeholder="Share an announcement, update, or thought...">
      <button id="postBtn"><i class="fas fa-paper-plane"></i> Post</button>
    </div>

    <div class="posts-container" id="postsContainer"></div>
  </main>

  <div class="toast" id="toastMsg">
    <i class="fas fa-check-circle"></i>
    <span id="toastText">Post published!</span>
  </div>

  <script src="postboard.js"></script>
</body>
</html>
