<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIAGARI · Post Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="postboard.css">
</head>
<body>

  <aside class="sidebar">
    <h1>SHIAGARI</h1>
    <nav>
      <a href="../landing/landing.html">📁 Projects</a>
      <a href="../idea/idea.html">💡 Idea Factory</a>
      <a href="../progress/progress.html">📊 Progress</a>
      <a href="../roadmap/roadmap.html">🗺️ Roadmap</a>
      <a href="../postboard/postboard.html" class="active">📰 Post Board</a>
      <a href="../message/message.html">💬 Chats</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2><i class="fas fa-newspaper"></i> Post Board</h2>
      <div class="stats-badge">
        <i class="fas fa-pen-fancy"></i>
        <span id="postCount">0</span> posts
      </div>
    </div>

    <!-- Create Post -->
    <div class="create-post">
      <div class="create-post-avatar">👤</div>
      <input type="text" id="postInput" placeholder="Share an announcement, update, or thought...">
      <button id="postBtn">Post</button>
    </div>

    <!-- Posts Container -->
    <div id="postsContainer" class="posts-container">
      <!-- Posts will appear here -->
    </div>
  </main>

  <div id="toastMsg" class="toast">Post published!</div>

  <script src="postboard.js"></script>
</body>
</html>
